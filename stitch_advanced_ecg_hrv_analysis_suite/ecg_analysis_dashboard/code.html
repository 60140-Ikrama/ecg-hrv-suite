<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clinical Sentinel - ECG Analysis</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#93000a",
                    "primary-fixed": "#9cf0ff",
                    "tertiary": "#ffe9cd",
                    "on-error-container": "#ffdad6",
                    "error": "#ffb4ab",
                    "inverse-surface": "#e2e2e6",
                    "outline-variant": "#3b494c",
                    "on-primary": "#00363d",
                    "on-secondary": "#283500",
                    "surface-container-highest": "#333538",
                    "secondary-fixed-dim": "#abd600",
                    "on-tertiary-fixed-variant": "#604100",
                    "surface": "#111316",
                    "on-error": "#690005",
                    "primary": "#c3f5ff",
                    "background": "#111316",
                    "primary-fixed-dim": "#00daf3",
                    "surface-variant": "#333538",
                    "on-surface-variant": "#bac9cc",
                    "tertiary-container": "#ffc769",
                    "on-primary-fixed-variant": "#004f58",
                    "surface-container-high": "#282a2d",
                    "outline": "#849396",
                    "inverse-primary": "#006875",
                    "on-background": "#e2e2e6",
                    "tertiary-fixed": "#ffdeac",
                    "on-tertiary": "#432c00",
                    "on-primary-fixed": "#001f24",
                    "secondary-fixed": "#c3f400",
                    "inverse-on-surface": "#2f3034",
                    "on-secondary-fixed": "#161e00",
                    "on-secondary-fixed-variant": "#3c4d00",
                    "surface-container-lowest": "#0c0e11",
                    "surface-tint": "#00daf3",
                    "on-primary-container": "#00626e",
                    "surface-container-low": "#1a1c1f",
                    "surface-bright": "#37393d",
                    "on-tertiary-container": "#775200",
                    "on-tertiary-fixed": "#281900",
                    "secondary": "#ffffff",
                    "on-surface": "#e2e2e6",
                    "tertiary-fixed-dim": "#ffba38",
                    "secondary-container": "#c3f400",
                    "surface-container": "#1e2023",
                    "surface-dim": "#111316",
                    "primary-container": "#00e5ff",
                    "on-secondary-container": "#556d00"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(51, 53, 56, 0.6);
            backdrop-filter: blur(20px);
        }
        .ecg-grid {
            background-image: 
                linear-gradient(rgba(59, 73, 76, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 73, 76, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body select-none">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#111316] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#c3f5ff]">clinical_notes</span>
<h1 class="font-['Manrope'] font-extrabold text-[#c3f5ff] tracking-tighter uppercase">Clinical Sentinel</h1>
</div>
<div class="px-3 py-1 bg-surface-container rounded text-xs font-['Manrope'] font-bold text-[#c3f5ff] tracking-tight hover:bg-[#333538] transition-colors cursor-pointer">
            File: ACTIVE_ECG_01
        </div>
</header>
<main class="pt-20 pb-28 px-4 flex flex-col gap-6 max-w-lg mx-auto">
<!-- File Metadata Section -->
<section class="flex justify-between items-end">
<div class="space-y-1">
<p class="text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant font-label">Current Session</p>
<h2 class="text-2xl font-headline font-bold text-primary tracking-tight">Patient_01.mat</h2>
</div>
<div class="text-right">
<span class="inline-block px-2 py-0.5 rounded-sm bg-secondary-fixed text-on-secondary-fixed text-[10px] font-bold mb-1">STABLE</span>
<p class="text-xs text-on-surface-variant font-label">Fs: 250Hz</p>
</div>
<!-- Signal Visualization: Raw -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<h3 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-outline"></span>
                    Raw ECG Signal
                </h3>
<span class="text-[10px] font-mono text-outline">CH_1 (mV)</span>
</div>
<div class="relative h-40 bg-surface-container-low rounded-md overflow-hidden ecg-grid">
<svg class="absolute inset-0 w-full h-full" preserveaspectratio="none" viewbox="0 0 400 160">
<!-- Raw Waveform Simulation -->
<path d="M0,80 L20,82 L40,78 L60,85 L80,75 L90,80 L95,20 L105,140 L110,80 L140,75 L180,82 L220,78 L260,85 L285,80 L290,20 L300,140 L305,80 L340,75 L380,82 L400,80" fill="none" stroke="#849396" stroke-opacity="0.6" stroke-width="1.5"></path>
</svg>
</div>
</div>
<!-- Signal Visualization: Filtered + Peaks -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<h3 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary-fixed"></span>
                    Filtered (Bandpass)
                </h3>
<span class="text-[10px] font-mono text-secondary-fixed">0.5Hz - 45Hz</span>
</div>
<div class="relative h-48 bg-surface-container-high rounded-md overflow-hidden ecg-grid border-l-2 border-primary/20">
<svg class="absolute inset-0 w-full h-full" preserveaspectratio="none" viewbox="0 0 400 160">
<!-- Clean Waveform -->
<path d="M0,80 Q20,80 40,80 T80,80 L92,80 L97,15 L102,145 L107,80 T140,80 Q180,80 220,80 T280,80 L292,80 L297,15 L302,145 L307,80 T340,80 Q380,80 400,80" fill="none" stroke="#c3f400" stroke-width="2"></path>
<!-- R-Peak Markers -->
<g fill="#ffba38">
<circle class="animate-pulse" cx="97" cy="15" r="4"></circle>
<circle class="animate-pulse" cx="297" cy="15" r="4"></circle>
</g>
<!-- Marker Text -->
<text fill="#ffba38" font-family="Inter" font-size="8" font-weight="bold" x="105" y="15">R-PEAK</text>
<text fill="#ffba38" font-family="Inter" font-size="8" font-weight="bold" x="305" y="15">R-PEAK</text>
</svg>
<!-- Floating Telemetry Overlay -->
<div class="absolute top-3 right-3 glass-panel px-3 py-2 rounded-sm border border-outline-variant/10">
<div class="text-[9px] text-on-surface-variant uppercase font-bold tracking-tighter">Heart Rate</div>
<div class="text-xl font-headline font-extrabold text-primary">72 <span class="text-[10px] font-normal text-on-surface-variant">BPM</span></div>
</div>
</div>
</div>
<!-- Mini-Map Navigation -->
<div class="space-y-2">
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Signal Explorer (30s Window)</p>
<div class="relative h-12 bg-surface-container-lowest rounded-md overflow-hidden opacity-80">
<svg class="w-full h-full opacity-30" preserveaspectratio="none" viewbox="0 0 1000 40">
<path d="M0,20 L1000,20 M50,20 L55,5 L60,35 L65,20 M150,20 L155,5 L160,35 L165,20 M250,20 L255,5 L260,35 L265,20 M350,20 L355,5 L360,35 L365,20 M450,20 L455,5 L460,35 L465,20 M550,20 L555,5 L560,35 L565,20" fill="none" stroke="#c3f5ff" stroke-width="1"></path>
</svg>
<!-- Zoom Scrubber -->
<div class="absolute top-0 left-1/4 w-1/3 h-full bg-primary/10 border-x-2 border-primary cursor-move flex items-center justify-between px-1">
<div class="w-1 h-4 bg-primary/40 rounded-full"></div>
<div class="w-1 h-4 bg-primary/40 rounded-full"></div>
</div>
</div>
<div class="flex justify-between text-[8px] font-mono text-outline uppercase px-1">
<span>00:00.0</span>
<span>00:15.0</span>
<span>00:30.0</span>
</div>
</div>
<!-- Metric Grid -->
<div class="grid grid-cols-2 gap-3">
<div class="p-4 bg-surface-container-low rounded-md space-y-1">
<span class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest">HRV (RMSSD)</span>
<p class="text-xl font-headline font-bold text-primary">42.5 <span class="text-xs text-on-surface-variant">ms</span></p>
</div>
<div class="p-4 bg-surface-container-low rounded-md space-y-1">
<span class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest">QRS Duration</span>
<p class="text-xl font-headline font-bold text-primary">94 <span class="text-xs text-on-surface-variant">ms</span></p>
</div>
</div>
</section></main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[#1a1c1f] shadow-[0_-4px_24px_rgba(0,218,243,0.05)] rounded-t-md">
<button class="flex flex-col items-center justify-center text-[#bac9cc] px-4 py-1.5 hover:text-[#c3f5ff] transition-all scale-95">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Home</span>
</button>
<button class="flex flex-col items-center justify-center bg-[#c3f5ff] text-[#00363d] rounded-md px-4 py-1.5 scale-95">
<span class="material-symbols-outlined mb-1">monitoring</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Analysis</span>
</button>
<button class="flex flex-col items-center justify-center text-[#bac9cc] px-4 py-1.5 hover:text-[#c3f5ff] transition-all scale-95">
<span class="material-symbols-outlined mb-1">compare_arrows</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Compare</span>
</button>
<button class="flex flex-col items-center justify-center text-[#bac9cc] px-4 py-1.5 hover:text-[#c3f5ff] transition-all scale-95">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Settings</span>
</button>
</nav>
</body></html>
